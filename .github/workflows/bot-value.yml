name: Bot Value Betting

on:
  schedule:
    # 2x/jour. The Odds API gratuit = 500 requetes/mois ; ~10 ligues/run => ~600/mois.
    # Pour rester sous le quota gratuit, repassez a une seule execution : '0 9 * * *'.
    - cron: '0 8,18 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restaurer le cache des statistiques
        uses: actions/cache@v4
        with:
          path: .cache
          key: betbot-cache-${{ github.run_id }}
          restore-keys: |
            betbot-cache-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the bot
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py

      - name: Archiver le journal des paris
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bets-log
          path: bets_log.csv
          if-no-files-found: ignore
